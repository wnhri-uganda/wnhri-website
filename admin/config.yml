backend:
  name: git-gateway
  branch: main

local_backend: true
media_folder: "assets/uploads"
public_folder: "/assets/uploads"

site_url: "https://wnhri.org"
display_url: "https://wnhri.org"
logo_url: "/assets/logo.png"

collections:
  - name: "site_settings"
    label: "Site Settings"
    files:
      - file: "content/site.json"
        label: "Homepage Content"
        name: "homepage"
        fields:
          - { label: "Organization Full Name", name: "organizationName", widget: "string" }
          - { label: "Short Name", name: "shortName", widget: "string" }
          - { label: "Founder Name", name: "founderName", widget: "string" }
          - { label: "Motto", name: "motto", widget: "string" }
          - { label: "Hero Label", name: "heroLabel", widget: "string" }
          - { label: "Hero Title", name: "heroTitle", widget: "string" }
          - { label: "Hero Text", name: "heroText", widget: "text" }
          - { label: "Mission", name: "mission", widget: "text" }
          - { label: "Vision", name: "vision", widget: "text" }
          - label: "Contact"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Email", name: "email", widget: "string" }
              - { label: "WhatsApp", name: "whatsapp", widget: "string" }
              - { label: "Mobile Money", name: "mobileMoney", widget: "string" }
              - { label: "Phone", name: "phone", widget: "string" }
              - { label: "Address", name: "address", widget: "text" }
          - label: "Programs"
            name: "programs"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

  - name: "updates"
    label: "News & Updates"
    folder: "content/updates"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
